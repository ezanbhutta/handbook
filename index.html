<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#7229FF" />
    <meta name="description" content="HaseebMadeIt company handbook — the single source of truth for the team." />
    <title>HaseebMadeIt Handbook</title>

    <!-- Set the theme before paint to avoid a flash of the wrong mode. -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('hb_theme')
          if (!t) {
            t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'night' : 'day'
          }
          document.documentElement.dataset.theme = t
        } catch (e) {
          document.documentElement.dataset.theme = 'day'
        }
      })()
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:ital,wght@0,400;0,500;0,600;1,400&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
