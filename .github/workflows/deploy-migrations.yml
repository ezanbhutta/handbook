name: Apply database migrations

# Runs your SQL migrations against Supabase automatically whenever a migration
# changes on main — so content updates go live without anyone pasting SQL.
# It stays asleep (and passes green) until the three secrets below are set.

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
  workflow_dispatch: {} # lets you run it by hand from the Actions tab

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Check that secrets are configured
        id: check
        run: |
          if [ -z "${{ secrets.SUPABASE_ACCESS_TOKEN }}" ] \
             || [ -z "${{ secrets.SUPABASE_DB_PASSWORD }}" ] \
             || [ -z "${{ secrets.SUPABASE_PROJECT_ID }}" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Auto-deploy secrets not set yet — skipping. Add SUPABASE_ACCESS_TOKEN, SUPABASE_DB_PASSWORD and SUPABASE_PROJECT_ID to enable."
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.check.outputs.ready == 'true'
        uses: actions/checkout@v4

      - name: Install the Supabase CLI
        if: steps.check.outputs.ready == 'true'
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link the project
        if: steps.check.outputs.ready == 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: supabase link --project-ref "${{ secrets.SUPABASE_PROJECT_ID }}"

      - name: Apply migrations
        if: steps.check.outputs.ready == 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: supabase db push
